<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Fiches de Voeux</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #1a5f7a;
  --blue-lt: #e8f4f8;
  --blue-md: #c3dfe9;
  --muted: #6b7280;
  --border: #d1d5db;
  --bg: #f3f6f8;
  --white: #fff;
  --text: #1a1a1a;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', Arial, sans-serif; font-size: 14px; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }

h1 { font-size: 20px; color: var(--blue); margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

.drop-zone {
  border: 2.5px dashed var(--border);
  border-radius: 12px;
  padding: 36px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  transition: border-color .15s, background .15s;
  cursor: pointer;
  margin-bottom: 20px;
}
.drop-zone.over { border-color: var(--blue); background: var(--blue-lt); }
.drop-zone svg { display: block; margin: 0 auto 10px; opacity: .4; }
.drop-zone input { display: none; }

.toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.toolbar .count { font-size: 13px; color: var(--muted); margin-right: auto; }
.btn {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  color: var(--text);
  transition: border-color .12s, background .12s;
}
.btn:hover { border-color: var(--blue); background: var(--blue-lt); }
.btn-danger { color: #c0392b; border-color: #fca5a5; }
.btn-danger:hover { background: #fef2f2; }

.table-wrap {
  overflow-x: auto;
  background: var(--white);
  border-radius: 10px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
  white-space: nowrap;
}
thead { background: var(--blue-lt); }
th {
  padding: 9px 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--blue);
  text-transform: uppercase;
  letter-spacing: .4px;
  border-bottom: 1.5px solid var(--blue-md);
  position: sticky;
  top: 0;
  background: var(--blue-lt);
}
td {
  padding: 7px 12px;
  border-bottom: 1px solid #f0f0f0;
  color: var(--text);
}
tr:hover td { background: #f9fafb; }
td.empty { color: var(--muted); font-style: italic; }

.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--blue);
  color: var(--white);
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: opacity .2s;
  pointer-events: none;
  z-index: 100;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<h1>Fiches de Voeux – Admin</h1>
<p class="subtitle">Glisser des PDF generees par le formulaire pour extraire les donnees</p>

<div class="drop-zone" id="dropZone">
  <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 16V4m0 0L8 8m4-4l4 4M4 17v2a1 1 0 001 1h14a1 1 0 001-1v-2"/></svg>
  Glisser un ou plusieurs PDF ici, ou <u>cliquer pour parcourir</u>
  <input type="file" id="fileInput" multiple accept=".pdf">
</div>

<div class="toolbar" id="toolbar" style="display:none;">
  <span class="count" id="countLabel"></span>
  <button class="btn" onclick="copyTSV()">Copier (Excel)</button>
  <button class="btn" onclick="copyCSV()">Copier (CSV)</button>
  <button class="btn btn-danger" onclick="clearAll()">Effacer</button>
</div>

<div class="table-wrap" id="tableWrap" style="display:none;">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="toast" id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const rows = [];

const COLUMNS = [
  { key: 'fileName',        label: 'Fichier' },
  { key: 'child.lastName',  label: 'Nom' },
  { key: 'child.firstName', label: 'Prenom' },
  { key: 'child.date',      label: 'Date' },
  { key: 'child.dateType',  label: 'Type date' },
  { key: 'structure',       label: 'Structure' },
  { key: 'typeAccueil',     label: 'Type accueil' },
  { key: 'lundi',           label: 'Lundi' },
  { key: 'mardi',           label: 'Mardi' },
  { key: 'mercredi',        label: 'Mercredi' },
  { key: 'jeudi',           label: 'Jeudi' },
  { key: 'vendredi',        label: 'Vendredi' },
  { key: 'vacScolaires',    label: 'Vac. scolaires' },
  { key: 'perm.choice',     label: 'Permanence' },
  { key: 'perm.detail',     label: 'Detail permanence' },
];

function flattenData(data, fileName) {
  const flat = { fileName: fileName };

  flat['child.lastName']  = data.child?.lastName || '';
  flat['child.firstName'] = data.child?.firstName || '';
  flat['child.date']      = data.child?.date || '';
  flat['child.dateType']  = data.child?.dateType || '';
  flat['structure']       = data.structure || '';
  flat['typeAccueil']     = data.typeAccueil || '';

  const dayNames = ['lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi'];
  if (data.days) {
    data.days.forEach(function(d, i) {
      flat[dayNames[i]] = d.selected ? (d.start || '') + ' - ' + (d.end || '') : '';
    });
  } else {
    dayNames.forEach(function(d) { flat[d] = ''; });
  }

  flat['vacScolaires'] = data.vacScolaires ? 'Oui' : 'Non';

  flat['perm.choice'] = data.permanence?.choice || '';
  if (data.permanence?.choice === 'keep' && data.permanence?.keep) {
    flat['perm.detail'] = data.permanence.keep.replace('_', ' ');
  } else if (data.permanence?.choice === 'change' && data.permanence?.changeRanks) {
    var sorted = Object.entries(data.permanence.changeRanks)
      .sort(function(a, b) { return a[1] - b[1]; })
      .map(function(e) { return e[1] + ':' + e[0].replace('_', ' '); })
      .join(', ');
    flat['perm.detail'] = sorted;
  } else {
    flat['perm.detail'] = '';
  }

  return flat;
}

function renderTable() {
  var toolbar = document.getElementById('toolbar');
  var tableWrap = document.getElementById('tableWrap');
  var thead = document.getElementById('thead');
  var tbody = document.getElementById('tbody');
  var countLabel = document.getElementById('countLabel');

  if (rows.length === 0) {
    toolbar.style.display = 'none';
    tableWrap.style.display = 'none';
    return;
  }

  toolbar.style.display = 'flex';
  tableWrap.style.display = 'block';
  countLabel.textContent = rows.length + ' fiche' + (rows.length > 1 ? 's' : '');

  // Build header safely
  thead.textContent = '';
  var headRow = document.createElement('tr');
  COLUMNS.forEach(function(c) {
    var th = document.createElement('th');
    th.textContent = c.label;
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);

  // Build body safely
  tbody.textContent = '';
  rows.forEach(function(row) {
    var tr = document.createElement('tr');
    COLUMNS.forEach(function(c) {
      var td = document.createElement('td');
      var v = row[c.key] || '';
      if (v) {
        td.textContent = v;
      } else {
        td.textContent = '\u2014';
        td.className = 'empty';
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

async function processFile(file) {
  try {
    var buf = await file.arrayBuffer();
    var pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    var meta = await pdf.getMetadata();
    var subject = meta.info && meta.info.Subject;
    if (!subject) {
      showToast(file.name + ' : pas de donnees');
      return;
    }
    var data = JSON.parse(subject);
    rows.push(flattenData(data, file.name));
    renderTable();
  } catch (err) {
    console.error('Error processing', file.name, err);
    showToast(file.name + ' : erreur de lecture');
  }
}

async function processFiles(files) {
  var pdfs = Array.from(files).filter(function(f) { return f.type === 'application/pdf' || f.name.endsWith('.pdf'); });
  if (pdfs.length === 0) return;
  await Promise.all(pdfs.map(processFile));
  showToast(pdfs.length + ' PDF traite' + (pdfs.length > 1 ? 's' : ''));
}

// Drag & drop on zone
var dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('over'); });
dropZone.addEventListener('drop', function(e) {
  e.preventDefault();
  dropZone.classList.remove('over');
  processFiles(e.dataTransfer.files);
});
dropZone.addEventListener('click', function() { document.getElementById('fileInput').click(); });
document.getElementById('fileInput').addEventListener('change', function(e) {
  processFiles(e.target.files);
  e.target.value = '';
});

// Full-page drag support
var pageDragCounter = 0;
document.addEventListener('dragenter', function(e) { e.preventDefault(); pageDragCounter++; dropZone.classList.add('over'); });
document.addEventListener('dragleave', function(e) { e.preventDefault(); pageDragCounter--; if (pageDragCounter <= 0) { pageDragCounter = 0; dropZone.classList.remove('over'); } });
document.addEventListener('dragover', function(e) { e.preventDefault(); });
document.addEventListener('drop', function(e) {
  if (e.target.closest('.drop-zone')) return;
  e.preventDefault();
  pageDragCounter = 0;
  dropZone.classList.remove('over');
  processFiles(e.dataTransfer.files);
});

// Copy helpers
function toDelimited(delim) {
  var header = COLUMNS.map(function(c) { return c.label; }).join(delim);
  var body = rows.map(function(row) {
    return COLUMNS.map(function(c) {
      var v = row[c.key] || '';
      if (v.indexOf(delim) >= 0 || v.indexOf('"') >= 0 || v.indexOf('\n') >= 0) {
        v = '"' + v.replace(/"/g, '""') + '"';
      }
      return v;
    }).join(delim);
  }).join('\n');
  return header + '\n' + body;
}

function copyTSV() {
  navigator.clipboard.writeText(toDelimited('\t')).then(function() { showToast('Copie (TSV) dans le presse-papier'); });
}

function copyCSV() {
  navigator.clipboard.writeText(toDelimited(',')).then(function() { showToast('Copie (CSV) dans le presse-papier'); });
}

function clearAll() {
  rows.length = 0;
  renderTable();
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}
</script>
</body>
</html>
