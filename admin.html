<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Fiches de Voeux</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐟</text></svg>">
<script src="vendor/pdf.min.js"></script>
<script src="vendor/qr-scanner.umd.min.js"></script>
<style>
@font-face { font-family: 'Inter'; font-style: normal; font-weight: 400; font-display: swap; src: url('vendor/fonts/inter-400.woff2') format('woff2'); }
@font-face { font-family: 'Inter'; font-style: normal; font-weight: 500; font-display: swap; src: url('vendor/fonts/inter-500.woff2') format('woff2'); }
@font-face { font-family: 'Inter'; font-style: normal; font-weight: 600; font-display: swap; src: url('vendor/fonts/inter-600.woff2') format('woff2'); }
@font-face { font-family: 'Inter'; font-style: normal; font-weight: 700; font-display: swap; src: url('vendor/fonts/inter-700.woff2') format('woff2'); }
:root {
  --blue: #1a5f7a;
  --blue-lt: #e8f4f8;
  --blue-md: #c3dfe9;
  --muted: #6b7280;
  --border: #d1d5db;
  --bg: #f3f6f8;
  --white: #fff;
  --text: #1a1a1a;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', Arial, sans-serif; font-size: 14px; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }

h1 { font-size: 20px; color: var(--blue); margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

.drop-zone {
  border: 2.5px dashed var(--border);
  border-radius: 12px;
  padding: 36px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  transition: border-color .15s, background .15s;
  cursor: pointer;
  margin-bottom: 20px;
}
.drop-zone.over { border-color: var(--blue); background: var(--blue-lt); }
.drop-zone svg { display: block; margin: 0 auto 10px; opacity: .4; }
.drop-zone input { display: none; }

.toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.toolbar .count { font-size: 13px; color: var(--muted); margin-right: auto; }
.btn {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  color: var(--text);
  transition: border-color .12s, background .12s;
}
.btn:hover { border-color: var(--blue); background: var(--blue-lt); }
.btn-danger { color: #c0392b; border-color: #fca5a5; }
.btn-danger:hover { background: #fef2f2; }

.table-wrap {
  overflow-x: auto;
  background: var(--white);
  border-radius: 10px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
  white-space: nowrap;
}
thead { background: var(--blue-lt); }
th {
  padding: 9px 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--blue);
  text-transform: uppercase;
  letter-spacing: .4px;
  border-bottom: 1.5px solid var(--blue-md);
  position: sticky;
  top: 0;
  background: var(--blue-lt);
}
td {
  padding: 7px 12px;
  border-bottom: 1px solid #f0f0f0;
  color: var(--text);
}
tr:hover td { background: #f9fafb; }
td.empty { color: var(--muted); font-style: italic; }

.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--blue);
  color: var(--white);
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: opacity .2s;
  pointer-events: none;
  z-index: 100;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div style="display:flex;justify-content:space-between;align-items:baseline;">
  <h1>Fiches de Voeux – Admin</h1>
  <a href="fiche-voeux.html" style="font-size:13px;color:var(--blue);text-decoration:none;font-weight:500;">&larr; Formulaire</a>
</div>
<p class="subtitle">Glisser des PDF generees par le formulaire pour extraire les donnees</p>

<div class="drop-zone" id="dropZone">
  <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 16V4m0 0L8 8m4-4l4 4M4 17v2a1 1 0 001 1h14a1 1 0 001-1v-2"/></svg>
  Glisser un ou plusieurs PDF ici, ou <u>cliquer pour parcourir</u>
  <input type="file" id="fileInput" multiple accept=".pdf">
</div>

<div style="display:flex;gap:8px;align-items:flex-end;margin-bottom:20px;">
  <div style="flex:1;">
    <label style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;">Importer un code texte</label>
    <input type="text" id="codeInput" placeholder="Coller un code N1... ici" style="width:100%;border:1.5px solid var(--border);border-radius:6px;padding:8px 11px;font-size:13px;font-family:monospace;margin-top:4px;outline:none;">
  </div>
  <button class="btn" onclick="importCode()" style="margin-bottom:0;">Importer</button>
  <button class="btn" onclick="openScanner()" style="margin-bottom:0;">📷 Scanner QR</button>
</div>

<!-- QR Scanner modal -->
<div id="scannerModal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);align-items:center;justify-content:center;">
  <div style="background:var(--white);border-radius:12px;padding:20px;max-width:400px;width:90%;box-shadow:0 8px 30px rgba(0,0,0,.2);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span style="font-weight:600;color:var(--blue);">Scanner un QR code</span>
      <button onclick="closeScanner()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1;">&times;</button>
    </div>
    <video id="scannerVideo" style="width:100%;border-radius:8px;background:#000;"></video>
    <div id="scannerStatus" style="font-size:12px;color:var(--muted);margin-top:8px;text-align:center;">Positionnez le QR code devant la camera...</div>
  </div>
</div>

<div class="toolbar" id="toolbar" style="display:none;">
  <span class="count" id="countLabel"></span>
  <button class="btn" onclick="copyTSV()">Copier (Excel)</button>
  <button class="btn" onclick="copyCSV()">Copier (CSV)</button>
  <button class="btn btn-danger" onclick="clearAll()">Effacer</button>
</div>

<div class="table-wrap" id="tableWrap" style="display:none;">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="toast" id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'vendor/pdf.worker.min.js';

const rows = [];

// Restore persisted rows
loadRows();
renderTable();

const COLUMNS = [
  { key: 'fileName',        label: 'Fichier' },
  { key: 'child.lastName',  label: 'Nom' },
  { key: 'child.firstName', label: 'Prenom' },
  { key: 'child.date',      label: 'Date' },
  { key: 'child.dateType',  label: 'Type date' },
  { key: 'structure',       label: 'Structure' },
  { key: 'typeAccueil',     label: 'Type accueil' },
  { key: 'lundi',           label: 'Lundi' },
  { key: 'mardi',           label: 'Mardi' },
  { key: 'mercredi',        label: 'Mercredi' },
  { key: 'jeudi',           label: 'Jeudi' },
  { key: 'vendredi',        label: 'Vendredi' },
  { key: 'vacScolaires',    label: 'Vac. scolaires' },
  { key: 'perm.choice',     label: 'Permanence' },
  { key: 'perm.detail',     label: 'Detail permanence' },
];

function flattenData(data, fileName, code) {
  const flat = { fileName: fileName, _code: code || '' };

  flat['child.lastName']  = data.child?.lastName || '';
  flat['child.firstName'] = data.child?.firstName || '';
  flat['child.date']      = data.child?.date || '';
  flat['child.dateType']  = data.child?.dateType || '';
  flat['structure']       = data.structure || '';
  flat['typeAccueil']     = data.typeAccueil || '';

  const dayNames = ['lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi'];
  if (data.days) {
    data.days.forEach(function(d, i) {
      flat[dayNames[i]] = d.selected ? (d.start || '') + ' - ' + (d.end || '') : '';
    });
  } else {
    dayNames.forEach(function(d) { flat[d] = ''; });
  }

  flat['vacScolaires'] = data.vacScolaires ? 'Oui' : 'Non';

  flat['perm.choice'] = data.permanence?.choice || '';
  if (data.permanence?.choice === 'keep' && data.permanence?.keep) {
    flat['perm.detail'] = data.permanence.keep.replace('_', ' ');
  } else if (data.permanence?.choice === 'change' && data.permanence?.changeRanks) {
    var sorted = Object.entries(data.permanence.changeRanks)
      .sort(function(a, b) { return a[1] - b[1]; })
      .map(function(e) { return e[1] + ':' + e[0].replace('_', ' '); })
      .join(', ');
    flat['perm.detail'] = sorted;
  } else {
    flat['perm.detail'] = '';
  }

  return flat;
}

function renderTable() {
  var toolbar = document.getElementById('toolbar');
  var tableWrap = document.getElementById('tableWrap');
  var thead = document.getElementById('thead');
  var tbody = document.getElementById('tbody');
  var countLabel = document.getElementById('countLabel');

  saveRows();

  if (rows.length === 0) {
    toolbar.style.display = 'none';
    tableWrap.style.display = 'none';
    return;
  }

  toolbar.style.display = 'flex';
  tableWrap.style.display = 'block';
  countLabel.textContent = rows.length + ' fiche' + (rows.length > 1 ? 's' : '');

  // Build header safely
  thead.textContent = '';
  var headRow = document.createElement('tr');
  var thEdit = document.createElement('th');
  thEdit.textContent = '';
  thEdit.style.width = '1%';
  headRow.appendChild(thEdit);
  COLUMNS.forEach(function(c) {
    var th = document.createElement('th');
    th.textContent = c.label;
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);

  // Build body safely
  tbody.textContent = '';
  rows.forEach(function(row) {
    var tr = document.createElement('tr');
    // Edit link
    var tdEdit = document.createElement('td');
    if (row._code) {
      var a = document.createElement('a');
      a.href = 'fiche-voeux.html?code=' + encodeURIComponent(row._code);
      a.textContent = '\u270e';
      a.title = 'Ouvrir dans le formulaire';
      a.style.cssText = 'text-decoration:none;font-size:15px;';
      tdEdit.appendChild(a);
    }
    tr.appendChild(tdEdit);
    COLUMNS.forEach(function(c) {
      var td = document.createElement('td');
      var v = row[c.key] || '';
      if (v) {
        td.textContent = v;
      } else {
        td.textContent = '\u2014';
        td.className = 'empty';
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

async function processFile(file) {
  try {
    var buf = await file.arrayBuffer();
    var pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    var meta = await pdf.getMetadata();
    var subject = meta.info && meta.info.Subject;
    if (!subject) {
      showToast(file.name + ' : pas de donnees');
      return;
    }
    var data = JSON.parse(subject);
    rows.push(flattenData(data, file.name, encodeFromExpanded(data)));
    renderTable();
  } catch (err) {
    console.error('Error processing', file.name, err);
    showToast(file.name + ' : erreur de lecture');
  }
}

async function processFiles(files) {
  var pdfs = Array.from(files).filter(function(f) { return f.type === 'application/pdf' || f.name.endsWith('.pdf'); });
  if (pdfs.length === 0) return;
  await Promise.all(pdfs.map(processFile));
  showToast(pdfs.length + ' PDF traite' + (pdfs.length > 1 ? 's' : ''));
}

// Drag & drop on zone
var dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('over'); });
dropZone.addEventListener('drop', function(e) {
  e.preventDefault();
  dropZone.classList.remove('over');
  processFiles(e.dataTransfer.files);
});
dropZone.addEventListener('click', function() { document.getElementById('fileInput').click(); });
document.getElementById('fileInput').addEventListener('change', function(e) {
  processFiles(e.target.files);
  e.target.value = '';
});

// Full-page drag support
var pageDragCounter = 0;
document.addEventListener('dragenter', function(e) { e.preventDefault(); pageDragCounter++; dropZone.classList.add('over'); });
document.addEventListener('dragleave', function(e) { e.preventDefault(); pageDragCounter--; if (pageDragCounter <= 0) { pageDragCounter = 0; dropZone.classList.remove('over'); } });
document.addEventListener('dragover', function(e) { e.preventDefault(); });
document.addEventListener('drop', function(e) {
  if (e.target.closest('.drop-zone')) return;
  e.preventDefault();
  pageDragCounter = 0;
  dropZone.classList.remove('over');
  processFiles(e.dataTransfer.files);
});

// Copy helpers
function toDelimited(delim) {
  var header = COLUMNS.map(function(c) { return c.label; }).join(delim);
  var body = rows.map(function(row) {
    return COLUMNS.map(function(c) {
      var v = row[c.key] || '';
      if (v.indexOf(delim) >= 0 || v.indexOf('"') >= 0 || v.indexOf('\n') >= 0) {
        v = '"' + v.replace(/"/g, '""') + '"';
      }
      return v;
    }).join(delim);
  }).join('\n');
  return header + '\n' + body;
}

function copyTSV() {
  navigator.clipboard.writeText(toDelimited('\t')).then(function() { showToast('Copie (TSV) dans le presse-papier'); });
}

function copyCSV() {
  navigator.clipboard.writeText(toDelimited(',')).then(function() { showToast('Copie (CSV) dans le presse-papier'); });
}

function saveRows() {
  try { localStorage.setItem('nemo_admin_rows', JSON.stringify(rows)); } catch (e) {}
}

function loadRows() {
  try {
    var saved = localStorage.getItem('nemo_admin_rows');
    if (saved) {
      var parsed = JSON.parse(saved);
      if (Array.isArray(parsed)) { parsed.forEach(function(r) { rows.push(r); }); }
    }
  } catch (e) {}
}

function clearAll() {
  rows.length = 0;
  saveRows();
  renderTable();
}

// Binary code decoder (matches fiche-voeux.js encodeQRBinary)
var SLOT_ORDER = [];
['matin','AM'].forEach(function(p) { ['lundi','mardi','mercredi','jeudi','vendredi'].forEach(function(d) { SLOT_ORDER.push(d + '_' + p); }); });

function minsToTime(m) {
  return Math.floor(m/60) + 'h' + String(m%60).padStart(2,'0');
}

function decodeQRBinary(str) {
  if (!str || !str.startsWith('N1')) return null;
  var raw = atob(str.slice(2));
  var buf = new Uint8Array(raw.length);
  for (var i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
  var pos = 0;

  var flags = buf[pos++];
  var structIdx = flags & 3;
  var typeIdx   = (flags >> 2) & 3;
  var vac       = (flags >> 4) & 1;
  var permChoice = (flags >> 5) & 3;
  var dateIsExpected = (flags >> 7) & 1;
  var dayBits = buf[pos++];

  var dec = new TextDecoder();
  var strings = [];
  for (var s = 0; s < 3; s++) {
    var len = buf[pos++];
    strings.push(dec.decode(buf.slice(pos, pos + len)));
    pos += len;
  }

  var structNames = [null, 'petit_nemo', 'baby_nemo', 'indifferent'];
  var typeNames   = [null, 'regulier', 'occasionnel'];
  var dayNames    = ['lundi','mardi','mercredi','jeudi','vendredi'];
  var days = [];
  for (var di = 0; di < 5; di++) {
    if (dayBits & (1 << di)) {
      var sv = buf[pos++] * 15 + 450;
      var ev = buf[pos++] * 15 + 450;
      days.push({ day: dayNames[di], selected: true, start: minsToTime(sv), end: minsToTime(ev) });
    } else {
      days.push({ day: dayNames[di], selected: false, start: null, end: null });
    }
  }

  var permData = { choice: null, keep: null, changeRanks: {} };
  if (permChoice === 1) {
    permData.choice = 'keep';
    permData.keep = SLOT_ORDER[buf[pos++]];
  } else if (permChoice === 2) {
    permData.choice = 'change';
    var count = buf[pos++];
    for (var ri = 0; ri < count; ri++) {
      var slot = SLOT_ORDER[buf[pos++]];
      var rank = buf[pos++];
      permData.changeRanks[slot] = rank;
    }
  }

  return {
    child: { lastName: strings[0], firstName: strings[1], date: strings[2] || '', dateType: dateIsExpected ? 'expected' : strings[2] ? 'birth' : null },
    structure: structNames[structIdx],
    typeAccueil: typeNames[typeIdx],
    days: days,
    vacScolaires: !!vac,
    permanence: permData,
  };
}

// Encode expanded data to N1 code (for edit links)
function timeToMinsInt(s) {
  if (!s) return 450;
  var m = s.match(/^(\d+)h(\d{2})$/);
  return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : 450;
}

function encodeFromExpanded(data) {
  var buf = [];
  var structMap = { petit_nemo:1, baby_nemo:2, indifferent:3 };
  var typeMap = { regulier:1, occasionnel:2 };
  var flags = (structMap[data.structure] || 0);
  flags |= (typeMap[data.typeAccueil] || 0) << 2;
  flags |= (data.vacScolaires ? 1 : 0) << 4;
  var pc = data.permanence?.choice;
  var permChoice = pc === 'keep' ? 1 : pc === 'change' ? 2 : 0;
  flags |= permChoice << 5;
  flags |= (data.child?.dateType === 'expected' ? 1 : 0) << 7;
  buf.push(flags);

  var dayBits = 0;
  (data.days || []).forEach(function(d, i) { if (d.selected) dayBits |= (1 << i); });
  buf.push(dayBits);

  var enc = new TextEncoder();
  [data.child?.lastName || '', data.child?.firstName || '', data.child?.date || ''].forEach(function(s) {
    var bytes = enc.encode(s);
    buf.push(bytes.length);
    for (var i = 0; i < bytes.length; i++) buf.push(bytes[i]);
  });

  (data.days || []).forEach(function(d) {
    if (d.selected) {
      buf.push(Math.round((timeToMinsInt(d.start) - 450) / 15));
      buf.push(Math.round((timeToMinsInt(d.end) - 450) / 15));
    }
  });

  if (permChoice === 1 && data.permanence.keep) {
    buf.push(SLOT_ORDER.indexOf(data.permanence.keep));
  } else if (permChoice === 2 && data.permanence.changeRanks) {
    var entries = Object.entries(data.permanence.changeRanks).sort(function(a,b) { return a[1] - b[1]; });
    buf.push(entries.length);
    entries.forEach(function(e) { buf.push(SLOT_ORDER.indexOf(e[0])); buf.push(e[1]); });
  }

  var u8 = new Uint8Array(buf);
  var b64 = '';
  for (var i = 0; i < u8.length; i++) b64 += String.fromCharCode(u8[i]);
  return 'N1' + btoa(b64);
}

function importCode() {
  var input = document.getElementById('codeInput');
  var code = input.value.trim();
  if (!code) return;
  try {
    var data = decodeQRBinary(code);
    if (!data) { showToast('Code invalide'); return; }
    rows.push(flattenData(data, 'code-import', code));
    renderTable();
    input.value = '';
    showToast('Code importe');
  } catch (err) {
    console.error('Code import error:', err);
    showToast('Erreur de decodage');
  }
}

// QR Scanner
var qrScanner = null;

function openScanner() {
  var modal = document.getElementById('scannerModal');
  modal.style.display = 'flex';
  var video = document.getElementById('scannerVideo');
  var status = document.getElementById('scannerStatus');
  status.textContent = 'Positionnez le QR code devant la camera...';

  qrScanner = new QrScanner(
    video,
    function(result) {
      var code = result.data;
      if (!code || !code.startsWith('N1')) return;
      closeScanner();
      try {
        var data = decodeQRBinary(code);
        if (!data) { showToast('QR invalide'); return; }
        rows.push(flattenData(data, 'qr-scan', code));
        renderTable();
        showToast('QR code importe');
      } catch (err) {
        console.error('QR scan decode error:', err);
        showToast('Erreur de decodage');
      }
    },
    { returnDetailedScanResult: true, highlightScanRegion: true }
  );

  qrScanner.start().catch(function(err) {
    status.textContent = 'Erreur camera : ' + err.message;
  });
}

function closeScanner() {
  if (qrScanner) { qrScanner.stop(); qrScanner.destroy(); qrScanner = null; }
  document.getElementById('scannerModal').style.display = 'none';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}
</script>
</body>
</html>
